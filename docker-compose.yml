version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: ssm_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ssm_demo
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./create_tables_and_data.sql:/docker-entrypoint-initdb.d/create_tables_and_data.sql:ro

  web:
    build: .
    container_name: ssm_web
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ssm_demo?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

volumes:
  db_data:
